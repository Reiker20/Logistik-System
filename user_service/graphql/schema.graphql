type Query {
    daftarPengguna: [Pengguna!]! @all(model: "App\\Models\\Pengguna")
    cariPengguna(id: ID! @eq): Pengguna @find(model: "App\\Models\\Pengguna")
}

type Mutation {
    tambahPengguna(input: InputTambahPengguna! @spread): Pengguna! @create(model: "App\\Models\\Pengguna")
    perbaruiPengguna(id: ID!, input: InputPerbaruiPengguna! @spread): Pengguna! @update(model: "App\\Models\\Pengguna")
    hapusPengguna(id: ID! @eq): Pengguna @delete(model: "App\\Models\\Pengguna")
}

type Pengguna {
    id: ID!
    nama_lengkap: String!
    email: String!
    nomor_telepon: String
    peran: String!
    created_at: DateTime
    updated_at: DateTime
}

input InputTambahPengguna {
    nama_lengkap: String!
    email: String!
    nomor_telepon: String
    peran: String! = "peminjam"
    kata_sandi: String!
}

input InputPerbaruiPengguna {
    nama_lengkap: String
    email: String
    nomor_telepon: String
    peran: String
}
